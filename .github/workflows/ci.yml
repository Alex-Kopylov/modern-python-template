name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - uses: jdx/mise-action@v4.1.0
        with:
          github_token: ${{ github.token }}
      - run: uv lock --check
      - run: uv sync --all-extras --locked
      - run: mise run lint

  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - uses: jdx/mise-action@v4.1.0
        with:
          github_token: ${{ github.token }}
      - run: uv lock --check
      - run: uv sync --all-extras --locked
      - run: mise run test
