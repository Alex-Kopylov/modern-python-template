name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-template:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - uses: jdx/mise-action@v4.2.0
        with:
          github_token: ${{ github.token }}
      - run: uvx --from yamllint yamllint -c template/.yamllint copier.yml .github/workflows/ci.yml
      - run: mise exec aqua:rhysd/actionlint@1.7.11 -- actionlint .github/workflows/ci.yml
      - run: mise exec aqua:zizmorcore/zizmor@1.25.2 -- zizmor .github/workflows/ci.yml

  render-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: scripts/test-render-contracts.sh

  generate-and-gate:
    name: Generate and gate (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: github-actions-on / default Python
            scenario: github-actions-on
            python_version: ""
          - label: github-actions-off / default Python
            scenario: github-actions-off
            python_version: ""
          - label: github-actions-off / Python 3.11.9 exact
            scenario: github-actions-off
            python_version: "3.11.9"
          - label: github-actions-off / Python 3.10 minor
            scenario: github-actions-off
            python_version: "3.10"
          - label: github-actions-on / Python 3.12 minor
            scenario: github-actions-on
            python_version: "3.12"
          - label: github-actions-on / Python 3.13 minor
            scenario: github-actions-on
            python_version: "3.13"
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - uses: jdx/mise-action@v4.2.0
        with:
          github_token: ${{ github.token }}
      - run: >-
          scripts/test-generation.sh
          "${{ matrix.scenario }}"
          "${{ matrix.python_version }}"
