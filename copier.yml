_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.1.0"

# Explicit jinja whitespace behavior: copier's defaults changed across
# releases (9.16 stopped trimming block-tag lines), which silently broke
# rendered markdown/TOML whitespace. Every .jinja file here is authored
# against these values.
_envops:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true

_message_after_copy: |
  Next steps:

    cd {{ _copier_conf.dst_path }}
    git init -b {{ main_branch_name }}
    git add .
    git commit -m "chore: initial project from template"
    mise install
    mise run install
    mise run install-hooks
    mise run lint

  The project intentionally starts without uv.lock. The first sync or lock
  command creates it; commit uv.lock with the generated project.

# Copier's FullLoader resolves this standard-library callable while loading the
# config; keep it hidden so it only supports later question validation.
python_is_keyword:
  type: yaml
  default: !!python/name:keyword.iskeyword
  when: false

project_name:
  type: str
  help: >-
    Project, distribution, and Python package name. Start with an ASCII
    letter; use only ASCII letters, digits, and internal underscores.
  default: my_project
  validator: >-
    {% if python_is_keyword(project_name) %}
    Project name must not be a Python keyword.
    {% endif %}
    {% if not (project_name |
       regex_search('^[A-Za-z](?:[A-Za-z0-9_]*[A-Za-z0-9])?$')) %}
    Project name must start with an ASCII letter, contain only ASCII letters,
    digits, and underscores, and end with an ASCII letter or digit.
    {% endif %}

project_description:
  type: str
  help: Short project description for README and package metadata.
  default: Project description

main_branch_name:
  type: str
  help: Default Git branch name used by setup guidance and generated CI.
  default: main
  validator: >-
    {% if not (main_branch_name | regex_search('^[A-Za-z0-9][A-Za-z0-9._/-]*$'))
       or '..' in main_branch_name
       or '//' in main_branch_name
       or '@{' in main_branch_name
       or main_branch_name == '@'
       or main_branch_name == 'HEAD'
       or (main_branch_name | regex_search('(^|/)\\.|[/.]$|\\.lock($|/)')) %}
    Use a valid Git branch name without spaces, consecutive dots or slashes,
    reflog syntax, dot-prefixed path components, a .lock suffix, or the
    reserved name HEAD.
    {% endif %}

python_version:
  type: str
  help: >-
    Python version for uv, requires-python, ty, and .python-version. Prefer a
    minor like 3.13 for a template-verified managed patch. Exact patches like
    3.11.9 are expert mode and must be available from the pinned uv release.
  default: "3.14"
  # Floor computed from requires-python of the latest dev toolchain deps:
  # deptry, pytest, yamllint, and check-jsonschema all require >=3.10.
  validator: >-
    {% if not (python_version | regex_search('^3\.\d+(\.\d+)?$'))
       or (python_version.split('.')[1] | int) < 10 %}
    3.10 is the oldest version supported by the dev toolchain
    {% endif %}

license:
  type: str
  help: Project license; choose Skip to define it after generation.
  choices:
    MIT: MIT
    Proprietary: Proprietary
    "Skip - define later (no LICENSE file)": Skip
  default: MIT

author_name:
  type: str
  help: Copyright holder and optional Docker maintainer label.
  default: ""

use_github_actions:
  type: bool
  help: Include GitHub Actions CI and dependency update automation.
  default: true

extra_linters:
  type: str
  help: Optional lint families to include.
  multiselect: true
  choices:
    jscpd: jscpd
    typos: typos
    markdownlint: markdownlint
  default:
    - jscpd
    - typos
    - markdownlint

coverage_fail_under:
  type: int
  help: Minimum coverage percentage; 0 leaves the coverage gate off.
  default: 80
  validator: >-
    {% if coverage_fail_under < 0 or coverage_fail_under > 100 %}
    Use an integer from 0 to 100.
    {% endif %}

python_version_minor:
  type: str
  default: "{{ python_version.split('.')[:2] | join('.') }}"
  when: false

python_version_pin:
  type: str
  # Exact patches pass through verbatim. Supported minors map to fresh managed
  # builds verified with pinned uv 0.11.27; any other minor passes through.
  default: >-
    {% if python_version.split('.') | length == 3 -%}
    {{ python_version }}
    {%- elif python_version == '3.10' -%}
    3.10.20
    {%- elif python_version == '3.11' -%}
    3.11.15
    {%- elif python_version == '3.12' -%}
    3.12.13
    {%- elif python_version == '3.13' -%}
    3.13.14
    {%- elif python_version == '3.14' -%}
    3.14.6
    {%- else -%}
    {{ python_version }}
    {%- endif %}
  when: false
