[tools]
python = "3.14.6"
uv = "latest"
node = "22.22.0"
"npm:jscpd" = "4.2.4"
"npm:markdownlint-cli2" = "0.22.1"
"aqua:01mf02/jaq" = "2.3.0"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:rhysd/actionlint" = "1.7.11"
"aqua:tamasfe/taplo" = "0.10.0"
"aqua:zizmorcore/zizmor" = "1.25.2"
"aqua:crate-ci/typos" = "1.20.7"

# Python tools managed via uv (installed in venv)
# Accessible via `uv run <tool>` after `uv sync`
[tasks.ruff-format]
description = "Format Python code with ruff"
run = "uv run ruff format --force-exclude"

[tasks.ruff-check]
description = "Lint Python code with ruff"
run = "uv run ruff check --fix --force-exclude"

[tasks.flake8]
description = "Run flake8 async checks"
run = "uv run flake8"

[tasks.ty-check]
description = "Type check Python code with ty"
run = "uv run ty check"

[tasks.yamllint]
description = "Lint YAML files"
run = "uv run yamllint -c .yamllint"

[tasks.check-jsonschema]
description = "Validate JSON schemas"
run = "uv run check-jsonschema"

[tasks.install]
description = "Install Python project dependencies"
run = "uv sync --all-extras"

[tasks.lint]
description = "Run all configured linters in parallel"
run = [
  { tasks = [
    "lint-python",
    "lint-dockerfile",
    "lint-md",
    "lint-yml",
    "lint-json",
    "lint-toml",
    "lint-sh",
    "lint-github-actions",
    "lint-duplicates",
    "lint-secrets",
    "lint-audit",
    "lint-typos",
  ] },
]

[tasks.lint-python]
description = "Lint, format-check, type-check, and scan Python code"
run = [
  "uv run ruff check src tests",
  "uv run ruff format --check src tests",
  "uv run flake8 src",
  "uv run ty check src",
  "uv run vulture --config .vulture.toml",
]

[tasks.lint-dockerfile]
description = "Lint Dockerfiles with Hadolint"
run = '''
files=$(find . \( -path ./.venv -o -path ./build -o -path ./dist -o -path ./.claude -o -path ./.codex -o -path ./.cursor -o -path ./.gemini \) -prune -o \( -name 'Dockerfile' -o -name 'Dockerfile.*' -o -name '*.dockerfile' \) -print)
if [ -z "$files" ]; then
  echo "No Dockerfiles to lint"
  exit 0
fi
for file in $files; do
  mise exec -- hadolint "$file"
done
'''

[tasks.lint-md]
description = "Lint Markdown files"
run = "mise exec -- markdownlint-cli2"

[tasks.lint-yml]
description = "Lint YAML files"
run = "uv run yamllint -c .yamllint ."

[tasks.lint-json]
description = "Validate JSON syntax with jaq"
run = '''
find . \( -path ./.venv -o -path ./node_modules -o -path ./build -o -path ./dist -o -path ./.claude -o -path ./.codex -o -path ./.cursor -o -path ./.gemini \) -prune -o -name '*.json' -print | while IFS= read -r file; do
  mise exec -- jaq empty "$file"
done
'''

[tasks.lint-toml]
description = "Lint TOML files with Taplo"
run = '''
files=$(find . \( -path ./.venv -o -path ./node_modules -o -path ./build -o -path ./dist -o -path ./.claude -o -path ./.codex -o -path ./.cursor -o -path ./.gemini \) -prune -o -name '*.toml' -print)
if [ -z "$files" ]; then
  echo "No TOML files to lint"
  exit 0
fi
mise exec -- taplo lint $files
'''

[tasks.lint-sh]
description = "Lint shell scripts with ShellCheck"
run = '''
files=$(find . \( -path ./.venv -o -path ./node_modules -o -path ./build -o -path ./dist -o -path ./.claude -o -path ./.codex -o -path ./.cursor -o -path ./.gemini \) -prune -o -type f -name '*.sh' -print)
if [ -z "$files" ]; then
  echo "No shell scripts to lint"
  exit 0
fi
for file in $files; do
  mise exec -- shellcheck "$file"
done
'''

[tasks.lint-github-actions]
description = "Lint GitHub Actions workflow files"
run = '''
if [ ! -d .github/workflows ]; then
  echo "No GitHub Actions workflows to lint"
  exit 0
fi
files=$(find .github/workflows \( -name '*.yml' -o -name '*.yaml' \) -print)
if [ -z "$files" ]; then
  echo "No GitHub Actions workflow files to lint"
  exit 0
fi
mise exec -- actionlint
uv run check-jsonschema --builtin-schema github-workflows $files
'''

[tasks.lint-duplicates]
description = "Detect duplicated code"
run = "mise exec -- jscpd --config .jscpd.json --threshold 5"

[tasks.lint-secrets]
description = "Scan git history for leaked secrets"
run = "mise exec -- gitleaks git --redact --no-banner"

[tasks.lint-gha-security]
description = "Scan GitHub Actions workflows for security issues"
run = '''
if [ ! -d .github/workflows ]; then
  echo "No GitHub Actions workflows to scan"
  exit 0
fi
files=$(find .github/workflows \( -name '*.yml' -o -name '*.yaml' \) -print)
if [ -z "$files" ]; then
  echo "No GitHub Actions workflow files to scan"
  exit 0
fi
mise exec -- zizmor $files
'''

[tasks.lint-audit]
description = "Scan Python dependencies for known CVEs"
run = "uv audit"

[tasks.lint-typos]
description = "Scan for spelling mistakes"
run = "mise exec -- typos"

[tasks.test]
description = "Run the pytest suite"
run = "uv run pytest tests/"

[tasks.test-cov]
description = "Run the pytest suite with a coverage report"
run = "uv run pytest tests/ --cov --cov-report=term-missing"

[tasks.format]
description = "Format and autofix Python code"
run = [
  "uv run ruff format src tests",
  "uv run ruff check --fix src tests",
]

[tasks.install-hooks]
description = "Install prek-managed pre-commit and pre-push hooks"
run = "uv run prek install --hook-type pre-commit --hook-type pre-push"

[tasks.clean]
description = "Remove local build and test cache directories"
run = [
  "find . -type d -name __pycache__ -exec rm -rf {} +",
  "find . -type d -name .pytest_cache -exec rm -rf {} +",
  "rm -rf dist build *.egg-info",
]
