# Taplo TOML Configuration
# https://taplo.tamasfe.dev/configuration/

# Include all TOML files in project
include = ["**/*.toml"]

# Exclude common directories
exclude = ["**/node_modules/**", "**/target/**", "**/.venv/**"]

[formatting]
# NOTE: Formatting options are intentionally relaxed.
# Preserve manual key ordering and avoid alignment-only diffs.

# Keep table entries unaligned
align_entries = false
# Keep entries flush with their table
indent_entries = false
# Keep subtable headers unindented
indent_tables = false
# Preserve intentional single-line and multiline arrays
array_auto_collapse = false
array_auto_expand = false
# Keep spaces inside inline tables
compact_inline_tables = false
# Preserve manual key ordering
reorder_keys = false
